version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: urban_triage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-urban_triage}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: urban_triage_app
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres
    ports:
      - "3000:3000"

volumes:
  postgres_data:
